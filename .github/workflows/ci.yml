name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest-cov
          pip install -r requirements.txt

      - name: Run Python Linter (flake8)
        run: |
          # run flake8 using the config file (.flake8) in the backend directory
          flake8 . --count

      - name: Run backend tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
        run: |
          pytest --cov=apps --cov-report=term-missing --cov-fail-under=80 tests/


  frontend:
    name: Frontend Lint, Tests, and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run JS/TS Linter (ESLint)
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
